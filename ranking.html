<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ランキング | SAIL RANK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.page-hero {
  padding: 120px 24px 60px;
  background: linear-gradient(180deg, rgba(0,100,200,.12) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
}
.page-hero-inner {
  max-width: 1200px;
  margin: auto;
}
.page-title {
  font-family: var(--font-display);
  font-size: clamp(44px, 6vw, 72px);
  letter-spacing: .04em;
  color: #fff;
  margin-bottom: 8px;
}
.page-desc { font-size: 15px; color: var(--muted2); }

.tab-bar {
  display: flex;
  gap: 4px;
  padding: 24px 24px 0;
  max-width: 1200px;
  margin: auto;
}
.tab-btn {
  padding: 10px 20px;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  background: transparent;
  color: var(--muted2);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.tab-btn.active {
  background: var(--surface);
  color: var(--accent);
  border-color: rgba(0,212,255,.25);
}
.tab-content {
  display: none;
  padding: 0 24px 80px;
  max-width: 1200px;
  margin: auto;
}
.tab-content.active { display: block; }
.tab-panel-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0 var(--radius) var(--radius) var(--radius);
  overflow: hidden;
}

/* 女子ランキング用 */
.women-badge {
  display: inline-block;
  background: rgba(255,100,180,.15);
  border: 1px solid rgba(255,100,180,.3);
  color: #ff88cc;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 99px;
  letter-spacing: .06em;
  margin-left: 8px;
}

/* 大学ランキング（詳細テーブル） */
.rank-header-6 {
  grid-template-columns: 60px 1fr 80px 80px 100px 100px;
}
.rank-row-6 {
  grid-template-columns: 60px 1fr 80px 80px 100px 100px;
}
</style>
</head>
<body>
<div style="background:#0a0a0a;padding:11px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none">
    <img src="tack-logo.png" alt="TACK" style="height:16px;filter:invert(1)">
  </a>
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:500;padding:6px 16px;border-radius:99px;text-decoration:none;border:1px solid rgba(255,255,255,.18);transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,.2)'" onmouseout="this.style.background='rgba(255,255,255,.1)'">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
    TACKトップへ戻る
  </a>
</div>


<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="sailrank.html" class="logo">SAIL<span>RANK</span></a>
    <div class="nav-links">
      <a href="ranking.html" style="color:#fff">ランキング</a>
      <a href="forecast.html">AI予測</a>
      <a href="players.html">選手DB</a>
      <a href="results.html">大会結果</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="ranking.html">ランキング</a>
    <a href="forecast.html">AI予測</a>
    <a href="players.html">選手DB</a>
    <a href="results.html">大会結果</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="section-label">RANKING</div>
    <h1 class="page-title">年間ランキング</h1>
    <p class="page-desc">主要決勝大会のみを対象に、独自アルゴリズムで算出した年間成績。</p>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('individual')">個人総合</button>
  <button class="tab-btn" onclick="switchTab('women')">女子</button>
  <button class="tab-btn" id="univTab" onclick="switchTab('university')">大学</button>
</div>

<!-- 個人総合 -->
<div class="tab-content active" id="tab-individual">
  <div class="tab-panel-box">
    <div class="rank-header">
      <span>順位</span><span>選手</span><span>大学</span><span>クラス</span><span class="text-right">年間Pt</span>
    </div>
    <div id="fullIndividualList"></div>
  </div>
</div>

<!-- 女子 -->
<div class="tab-content" id="tab-women">
  <div class="tab-panel-box">
    <div class="rank-header">
      <span>順位</span><span>選手 <span class="women-badge">WOMEN'S</span></span><span>大学</span><span>クラス</span><span class="text-right">年間Pt</span>
    </div>
    <div id="womenList"></div>
  </div>
</div>

<!-- 大学 -->
<div class="tab-content" id="tab-university">
  <div class="tab-panel-box">
    <div class="rank-header rank-header-6">
      <span>順位</span><span>大学</span><span>大会数</span><span>TOP3</span><span>平均順位</span><span class="text-right">大学Pt</span>
    </div>
    <div id="fullUnivList"></div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="logo">SAIL<span>RANK</span></div>
        <p>学生セーリングの熱量を、数字で伝える。</p>
      </div>
      <div class="footer-links">
        <a href="ranking.html">ランキング</a>
        <a href="forecast.html">AI予測</a>
        <a href="players.html">選手DB</a>
        <a href="results.html">大会結果</a>
      </div>
    </div>
    <div class="footer-bottom">
      <small>© 2024 SAIL RANK. データは公式大会結果をもとに独自算出。</small>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
  // URLハッシュも更新
  history.replaceState(null, '', '#' + id);
}

// ページ初期化時にハッシュがあればそのタブを開く
window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#', '');
  if (hash && document.getElementById('tab-' + hash)) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + hash).classList.add('active');
    document.getElementById(hash + 'Tab')?.classList.add('active');
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const topClass = ['top1','top2','top3'];

  // 個人総合（全員）
  const fullList = document.getElementById('fullIndividualList');
  if (fullList) {
    fullList.innerHTML = SITE_DATA.individualRanking.map((p, i) => `
      <div class="rank-row ${topClass[i] || ''}">
        <div class="rank-num">#${p.rank}</div>
        <div><div class="rank-name">${p.name}</div><div class="rank-role">${p.role}</div></div>
        <div class="rank-univ">${p.univ}</div>
        <div class="rank-class">${p.cls}</div>
        <div class="rank-pt">${p.pt}</div>
      </div>
    `).join('');
  }

  // 女子ランキング
  const womenList = document.getElementById('womenList');
  if (womenList) {
    womenList.innerHTML = SITE_DATA.womenRanking
      ? SITE_DATA.womenRanking.map((p, i) => `
      <div class="rank-row ${topClass[i] || ''}">
        <div class="rank-num">#${p.rank}</div>
        <div><div class="rank-name">${p.name}</div><div class="rank-role">${p.role}</div></div>
        <div class="rank-univ">${p.univ}</div>
        <div class="rank-class">${p.cls}</div>
        <div class="rank-pt">${p.pt}</div>
      </div>
    `).join('')
      : '<div style="padding:40px;text-align:center;color:var(--muted)">データ準備中</div>';
  }

  // 大学ランキング（詳細）
  const univList = document.getElementById('fullUnivList');
  if (univList) {
    univList.innerHTML = SITE_DATA.universityRanking.map((u, i) => `
      <div class="rank-row rank-row-6 ${topClass[i] || ''}">
        <div class="rank-num">#${u.rank}</div>
        <div class="rank-name">${u.name}</div>
        <div class="rank-class">${u.events || '-'}</div>
        <div class="rank-class">${u.top3 !== undefined ? u.top3 : '-'}</div>
        <div class="rank-class">${u.avgRank || '-'}</div>
        <div class="rank-pt">${u.pt}</div>
      </div>
    `).join('');
  }
});
</script>
</body>
</html>
