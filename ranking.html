<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ランキング | SAIL RANK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.page-hero{padding:40px 24px 32px;border-bottom:1px solid #e2e8f0}
.page-hero-inner{max-width:1200px;margin:auto}
.page-desc{font-size:15px;color:#64748b}
.tab-wrap{max-width:1200px;margin:0 auto;padding:24px 24px 0}
.year-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.year-btn{padding:7px 18px;border:1px solid #e2e8f0;border-radius:99px;background:transparent;color:#64748b;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.06em;cursor:pointer;transition:all .2s}
.year-btn:hover{border-color:#6366f1;color:#6366f1}
.year-btn.active{background:#6366f1;border-color:#6366f1;color:#fff;font-weight:700}
.cat-group-label{font-size:11px;font-weight:700;letter-spacing:.12em;color:#94a3b8;text-transform:uppercase;margin-bottom:8px}
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.cat-btn{padding:6px 14px;border:1px solid #e2e8f0;border-radius:99px;background:transparent;color:#64748b;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.cat-btn:hover{border-color:#6366f1;color:#6366f1}
.cat-btn.active{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.4);color:#6366f1}
.tab-panels{max-width:1200px;margin:0 auto;padding:24px 24px 80px}
.rank-table{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.panel-title{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:.06em;color:#0f172a}
.rank-header{display:grid;padding:12px 20px;background:#f8faff;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:700;letter-spacing:.1em;color:#94a3b8;text-transform:uppercase}
.h6{grid-template-columns:52px 1fr 150px 80px 80px 80px}
.r6{grid-template-columns:52px 1fr 150px 80px 80px 80px}
.h-univ{grid-template-columns:52px 1fr 70px 60px 90px 90px}
.r-univ{grid-template-columns:52px 1fr 70px 60px 90px 90px}
.rank-row{display:grid;padding:13px 20px;border-bottom:1px solid #f1f5f9;align-items:center;transition:background .15s;cursor:pointer}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:#f8faff}
.rank-num{font-family:'Bebas Neue',cursive;font-size:20px;color:#94a3b8;letter-spacing:.04em}
.top1 .rank-num{color:#f5b731}
.top2 .rank-num{color:#9ca3af}
.top3 .rank-num{color:#cd7f32}
.rank-name{font-size:15px;font-weight:700;color:#0f172a}
.rank-sub{font-size:12px;color:#94a3b8;margin-top:2px}
.rank-univ{font-size:13px;color:#64748b}
.rank-cls{font-size:12px;color:#94a3b8}
.rank-role{font-size:12px;font-weight:700}
.role-sk{color:#6366f1}
.role-cr{color:#f5b731}
.rank-pt{text-align:right;font-family:'Bebas Neue',cursive;font-size:20px;color:#6366f1;letter-spacing:.04em}
.text-right{text-align:right}
.empty{padding:40px;text-align:center;color:#94a3b8}
/* モーダル */
.pm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;overflow-y:auto;padding:40px 16px 80px}
.pm-overlay.open{display:block}
.pm-modal{background:#fff;max-width:660px;margin:0 auto;border-radius:16px;padding:32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.pm-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;padding:4px}
.pm-name{font-size:26px;font-weight:900;color:#0f172a;margin-bottom:4px}
.pm-meta{color:#64748b;font-size:14px;margin-bottom:20px}
.pm-stats{display:flex;gap:10px;margin-bottom:24px}
.pm-stat{flex:1;background:#f8faff;border-radius:12px;padding:14px;text-align:center}
.pm-stat-val{font-size:22px;font-weight:900;color:#6366f1}
.pm-stat-lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.pm-section{font-weight:700;font-size:14px;margin-bottom:8px;color:#0f172a}
.pm-chart-wrap{background:#f8faff;border-radius:12px;padding:16px;margin-bottom:20px}
.pm-table{width:100%;border-collapse:collapse;font-size:13px}
.pm-table th{padding:8px 4px;text-align:left;font-size:11px;color:#94a3b8;border-bottom:2px solid #e2e8f0;font-weight:600}
.pm-table th.r{text-align:right}
.pm-table td{padding:8px 4px;border-bottom:1px solid #f1f5f9;color:#475569}
.pm-table td.rnk{font-weight:700;color:#0f172a;text-align:center}
.pm-table td.pt{text-align:right;color:#6366f1;font-weight:700}
@media(max-width:700px){
  .h6,.r6{grid-template-columns:44px 1fr 70px}
  .h6>*:nth-child(n+4),.r6>*:nth-child(n+4){display:none}
  .h-univ,.r-univ{grid-template-columns:44px 1fr 70px}
  .h-univ>*:nth-child(n+4),.r-univ>*:nth-child(n+4){display:none}
}
</style>
</head>
<body>

  <div class="nav-inner">
    <a href="sailrank.html" class="logo">SAIL<span>RANK</span></a>
    <div class="nav-links">
      <a href="ranking.html" class="nav-active">ランキング</a>

        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        TACK
      </a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="ranking.html">ランキング</a>
    <a href="forecast.html">AI予測</a>
    <a href="players.html">選手DB</a>
    <a href="results.html">大会結果</a>

  </div>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="section-label">RANKING</div>
    <h1 class="page-title">ランキング</h1>
    <p class="page-desc">独自アルゴリズムで算出。年度別・歴代の切り替えが可能。</p>
  </div>
</div>

<div class="tab-wrap">
  <div class="year-tabs" id="yearTabs">
    <button class="year-btn active" data-year="all">歴代</button>
    <button class="year-btn" data-year="2026">2026</button>
    <button class="year-btn" data-year="2025">2025</button>
    <button class="year-btn" data-year="2024">2024</button>
    <button class="year-btn" data-year="2023">2023</button>
    <button class="year-btn" data-year="2022">2022</button>
    <button class="year-btn" data-year="2021">2021</button>
    <button class="year-btn" data-year="2020">2020</button>
    <button class="year-btn" data-year="2019">2019</button>
    <button class="year-btn" data-year="2018">2018</button>
    <button class="year-btn" data-year="2017">2017</button>
    <button class="year-btn" data-year="2016">2016</button>
  </div>
  <div class="cat-group-label">個人</div>
  <div class="cat-tabs" id="catTabs">
    <button class="cat-btn active" data-cat="individual">総合</button>
    <button class="cat-btn" data-cat="skipper">全スキッパー</button>
    <button class="cat-btn" data-cat="crew">全クルー</button>
    <button class="cat-btn" data-cat="sk470">470 スキッパー</button>
    <button class="cat-btn" data-cat="cr470">470 クルー</button>
    <button class="cat-btn" data-cat="skSnipe">スナイプ スキッパー</button>
    <button class="cat-btn" data-cat="crSnipe">スナイプ クルー</button>
  </div>
  <div class="cat-group-label">大学</div>
  <div class="cat-tabs">
    <button class="cat-btn" data-cat="university">大学総合</button>

<div class="tab-panels">
  <div class="panel-header">
    <div class="panel-title" id="panelTitle">歴代 個人総合</div>
  </div>
  <div class="rank-table" id="rankTable">
    <div class="rank-header h6" id="rankHeader">
      <span>順位</span><span>選手</span><span>大学</span><span>クラス</span><span>役割</span><span class="text-right">累計Pt</span>

  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand"><div class="logo">SAIL<span>RANK</span></div><p>学生セーリングの熱量を、数字で伝える。</p></div>
      <div class="footer-links"><a href="ranking.html">ランキング</a><a href="forecast.html">AI予測</a><a href="players.html">選手DB</a><a href="results.html">大会結果</a></div>
    </div>

  </div>
</footer>

<!-- 選手モーダル -->
<div class="pm-overlay" id="pmOverlay" onclick="if(event.target===this)closePm()">
  <div class="pm-modal">
    <button class="pm-close" onclick="closePm()">✕</button>
    <div id="pmContent"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let currentYear='all', currentCat='individual';

function getKey(year,cat){
  if(cat==='university') return 'universityRanking';
  if(year==='all'){
    return {individual:'individualRanking',skipper:'rankingSkipper',crew:'rankingCrew',
      sk470:'ranking470Skipper',cr470:'ranking470Crew',skSnipe:'rankingSnipeSkipper',crSnipe:'rankingSnipeCrew'}[cat];
  }
  return {individual:`y${year}_individual`,skipper:`y${year}_skipper`,crew:`y${year}_crew`,
    sk470:`y${year}_sk470`,cr470:`y${year}_cr470`,skSnipe:`y${year}_skSnipe`,crSnipe:`y${year}_crSnipe`}[cat];
}

function tc(i){ return i===0?'top1':i===1?'top2':i===2?'top3':''; }

function renderPlayers(data){
  const h = document.getElementById('rankHeader');
  const ptLabel = currentYear==='all' ? '累計Pt' : `${currentYear}Pt`;
  h.className = 'rank-header h6';
  h.innerHTML = `<span>順位</span><span>選手</span><span>大学</span><span>クラス</span><span>役割</span><span class="text-right">${ptLabel}</span>`;
  return (data||[]).map((p,i) => {
    const cls = p.cls==='470' ? '470級' : 'スナイプ級';
    const rc = p.role==='Skipper' ? 'role-sk' : 'role-cr';
    const safeName = p.name.replace(/'/g,"\\'");
    return `<div class="rank-row r6 ${tc(i)}" onclick="openPm('${safeName}')">
      <div class="rank-num">#${p.rank}</div>
      <div><div class="rank-name">${p.name}</div><div class="rank-sub">出場${p.events}大会</div></div>
      <div class="rank-univ">${p.univ}</div>
      <div class="rank-cls">${cls}</div>
      <div class="rank-role ${rc}">${p.role}</div>
      <div class="rank-pt">${p.pt}</div>
    </div>`;
  }).join('');
}

function renderUniv(data){
  const h = document.getElementById('rankHeader');
  h.className = 'rank-header h-univ';
  h.innerHTML = `<span>順位</span><span>大学</span><span class="text-right">大会数</span><span class="text-right">TOP3</span><span class="text-right">平均順位</span><span class="text-right">累計Pt</span>`;
  return (data||[]).map((u,i) => `
    <div class="rank-row r-univ ${tc(i)}">
      <div class="rank-num">#${u.rank}</div>
      <div class="rank-name">${u.name}</div>
      <div class="rank-pt text-right">${u.events}</div>
      <div class="rank-pt text-right" style="color:#f5b731">${u.top3}</div>
      <div class="rank-cls text-right">${u.avgRank}位</div>
      <div class="rank-pt">${u.pt}</div>
    </div>`).join('');
}

function updateTitle(){
  const yL = currentYear==='all' ? '歴代' : `${currentYear}年度`;
  const cL = {individual:'個人総合',skipper:'全スキッパー',crew:'全クルー',
    sk470:'470級スキッパー',cr470:'470級クルー',skSnipe:'スナイプスキッパー',crSnipe:'スナイプクルー',
    university:'大学総合'}[currentCat];
  document.getElementById('panelTitle').textContent = `${yL} ${cL}`;
}

function render(){
  updateTitle();
  const key = getKey(currentYear, currentCat);
  const data = SITE_DATA[key] || [];
  const html = currentCat==='university' ? renderUniv(data) : renderPlayers(data);
  document.getElementById('rankList').innerHTML = html || '<div class="empty">データなし</div>';
}

document.getElementById('yearTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-year]'); if(!btn) return;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentYear = btn.dataset.year; render();
});
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active'); currentCat = this.dataset.cat; render();
  });
});
document.addEventListener('DOMContentLoaded', render);

const hb = document.getElementById('hamburger'), mm = document.getElementById('mobileMenu');
if(hb&&mm) hb.addEventListener('click', () => { hb.classList.toggle('active'); mm.classList.toggle('open'); });
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
});

// ── 選手モーダル ──
let _pmChart = null;

function buildPlayerMap(){
  const map = {};
  Object.keys(SITE_DATA).forEach(k => {
    if(k==='universityRanking'||k==='forecasts'||k==='nextEvent') return;
    const arr = SITE_DATA[k];
    if(!Array.isArray(arr)) return;
    arr.forEach(p => {
      const key = p.name+'|'+p.univ+'|'+p.cls+'|'+p.role;
      if(!map[key]) {
        map[key] = {
          name:p.name, univ:p.univ, cls:p.cls, role:p.role,
          allPt:0, recMap:{}
        };
      }
      if((p.allPt||p.pt||0) > map[key].allPt) map[key].allPt = p.allPt||p.pt||0;
      if(Array.isArray(p.records)) {
        p.records.forEach(r => { map[key].recMap[r.event] = r; });
      }
    });
  });
  // recMapをrecordsリストに変換
  const result = {};
  Object.entries(map).forEach(([key, p]) => {
    const records = Object.values(p.recMap).sort((a,b)=>a.year-b.year||a.event.localeCompare(b.event));
    result[key] = {name:p.name,univ:p.univ,cls:p.cls,role:p.role,allPt:p.allPt,pt:p.allPt,records};
  });
  return result;
}


function openPm(name){
  const map = buildPlayerMap();
  const p = Object.values(map).find(x => x.name === name);
  if(!p){ location.href = 'players.html?name=' + encodeURIComponent(name); return; }

  const records = [...(p.records||[])].sort((a,b) => a.year-b.year || a.event.localeCompare(b.event));
  const totalPt = p.allPt || p.pt;
  const clsLabel = p.cls==='470' ? '470級' : 'スナイプ級';
  const bestRank = records.length ? Math.min(...records.map(r=>r.rank)) : '-';

  // 年度別平均順位
  const yearMap = {};
  records.forEach(r => {
    if(!yearMap[r.year]) yearMap[r.year] = [];
    yearMap[r.year].push(r.rank);
  });
  const years = Object.keys(yearMap).sort();
  const avgRanks = years.map(y => {
    const arr = yearMap[y];
    return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length * 10)/10;
  });

  // 大会別成績テーブル
  const rows = records.map(r =>
    `<tr><td>${r.year}年</td><td style="font-size:12px">${r.event}</td><td class="rnk">#${r.rank}</td><td class="pt">${r.pt}</td></tr>`
  ).join('');

  document.getElementById('pmContent').innerHTML = `
    <div class="pm-name">${p.name}</div>
    <div class="pm-meta">${p.univ} ／ ${clsLabel} ／ ${p.role}</div>
    <div class="pm-stats">
      <div class="pm-stat"><div class="pm-stat-val">${totalPt}</div><div class="pm-stat-lbl">累計Pt</div></div>
      <div class="pm-stat"><div class="pm-stat-val">${records.length}</div><div class="pm-stat-lbl">出場大会</div></div>
      <div class="pm-stat"><div class="pm-stat-val">${bestRank}</div><div class="pm-stat-lbl">最高順位</div></div>
    </div>
    <div class="pm-section">年度別 平均順位</div>
    <div class="pm-chart-wrap"><canvas id="pmChart" height="160"></canvas></div>
    <div class="pm-section">大会別成績</div>
    <table class="pm-table">
      <thead><tr><th>年度</th><th>大会名</th><th style="text-align:center">着順</th><th class="r">Pt</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  document.getElementById('pmOverlay').classList.add('open');

  if(_pmChart) _pmChart.destroy();
  _pmChart = new Chart(document.getElementById('pmChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: years.map(y => y+'年'),
      datasets: [{
        data: avgRanks,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,.1)',
        pointBackgroundColor: '#6366f1',
        pointRadius: 6, tension: 0.3, fill: true
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { reverse:true, min:1,
             ticks:{color:'#64748b', callback: v => '#'+v},
             grid:{color:'rgba(0,0,0,.06)'},
             title:{display:true, text:'平均順位', color:'#64748b', font:{size:11}}
        },
        x: { ticks:{color:'#64748b'} }
      },
      plugins: {
        legend:{display:false},
        tooltip:{callbacks:{label: ctx => {
          const y = years[ctx.dataIndex];
          const cnt = yearMap[y].length;
          return `平均順位: #${ctx.parsed.y}（${cnt}大会）`;
        }}}
      }
    }
  });
}

function closePm(){
  document.getElementById('pmOverlay').classList.remove('open');
}
</script>
</body>
</html>
