<script>
// 全選手データを結合・重複排除（allPtで最大値を保持）
function getAllPlayers() {
  const map = {};

  // STEP1: individualRankingから正式な大会名・着順付きrecordsを取得
  (SITE_DATA.individualRanking || []).forEach(p => {
    const key = p.name + '|' + p.univ + '|' + p.cls + '|' + p.role;
    if (!map[key]) {
      map[key] = { name: p.name, univ: p.univ, cls: p.cls, role: p.role, allPt: 0, recMap: {} };
    }
    if ((p.allPt || p.pt || 0) > map[key].allPt) map[key].allPt = p.allPt || p.pt || 0;
    if (Array.isArray(p.records)) {
      p.records.forEach(r => { map[key].recMap[r.event] = r; });
    }
  });

  // STEP2: 年度別データ（y****_sk470等）から全選手を補完
  // individualRankingに未掲載の選手にも疑似recordを生成してグラフ・成績を表示可能にする
  const suffixLabel = {
    sk470:   '関東秋季選手権 470級',   cr470:   '関東秋季選手権 470級',
    skSnipe: '関東秋季選手権 スナイプ級', crSnipe: '関東秋季選手権 スナイプ級',
    skipper: '個人選手権 総合',          crew:    '個人選手権 総合',
    individual: '個人選手権 総合'
  };
  Object.keys(SITE_DATA).forEach(k => {
    const m = k.match(/^y(\d{4})_(.+)$/);
    if (!m) return;
    const year = parseInt(m[1]), suffix = m[2];
    const label = suffixLabel[suffix];
    if (!label) return;
    (SITE_DATA[k] || []).forEach(p => {
      const key = p.name + '|' + p.univ + '|' + p.cls + '|' + p.role;
      if (!map[key]) {
        map[key] = { name: p.name, univ: p.univ, cls: p.cls, role: p.role, allPt: 0, recMap: {} };
      }
      if ((p.allPt || p.pt || 0) > map[key].allPt) map[key].allPt = p.allPt || p.pt || 0;
      // STEP1で正式recordが既にある場合は上書きしない
      const evKey = year + '_' + suffix;
      if (!map[key].recMap[evKey]) {
        map[key].recMap[evKey] = {
          year, event: year + '年度 ' + label,
          rank: p.rank, pt: p.pt || 0
        };
      }
    });
  });

  return Object.values(map).map(p => {
    const records = Object.values(p.recMap).sort((a, b) =>
      a.year - b.year || a.event.localeCompare(b.event)
    );
    return {
      name: p.name, univ: p.univ, cls: p.cls, role: p.role,
      allPt: p.allPt, pt: p.allPt,
      events: records.length,
      records: records
    };
  }).sort((a, b) => b.allPt - a.allPt);
}


let allPlayers = [];
let chartInstance = null;

function renderGrid(players, query) {
  const grid = document.getElementById('playerGrid');
  const info = document.getElementById('searchInfo');

  if (!query) {
    grid.innerHTML = '';
    info.textContent = '選手名または大学名を入力して検索してください';
    return;
  }
  if (players.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:#64748b;padding:40px">該当する選手が見つかりませんでした</p>';
    info.textContent = '「' + query + '」の検索結果: 0件';
    return;
  }
  info.textContent = '「' + query + '」の検索結果: ' + players.length + '名' + (players.length >= 100 ? '（上位100件）' : '');

  grid.innerHTML = players.map(function(p) {
    const roleTag = p.role === 'Skipper'
      ? '<span class="pc-tag tag-sk">Skipper</span>'
      : '<span class="pc-tag tag-cr">Crew</span>';
    const clsTag = p.cls === '470'
      ? '<span class="pc-tag tag-470">470級</span>'
      : '<span class="pc-tag tag-snipe">Snipe</span>';
    const safeName = p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeUniv = p.univ.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="player-card" onclick="openModal(\'' + safeName + '\',\'' + safeUniv + '\',\'' + p.cls + '\',\'' + p.role + '\')">'
      + '<div class="pc-name">' + p.name + '</div>'
      + '<div class="pc-univ">' + p.univ + '</div>'
      + '<div class="pc-meta">' + roleTag + clsTag + '</div>'
      + '<div class="pc-pt">' + (p.allPt||p.pt) + ' pt</div>'
      + '</div>';
  }).join('');
}

function openModal(name, univ, cls, role) {
  // 指定条件で検索、なければ名前だけで検索
  var p = allPlayers.find(function(x) {
    return x.name === name && x.univ === univ && x.cls === cls && x.role === role;
  }) || allPlayers.find(function(x) { return x.name === name; });
  if (!p) return;

  var records = (p.records || []).slice().sort(function(a,b){
    return a.year - b.year || a.event.localeCompare(b.event);
  });
  var clsLabel = p.cls === '470' ? '470級' : 'スナイプ級';
  var totalPt = p.allPt || p.pt;
  var bestRank = records.length ? Math.min.apply(null, records.map(function(r){ return r.rank; })) : '-';

  // 年度別平均順位を計算
  var yearMap = {};
  records.forEach(function(r) {
    if (!yearMap[r.year]) yearMap[r.year] = [];
    yearMap[r.year].push(r.rank);
  });
  var years = Object.keys(yearMap).sort();
  var avgRanks = years.map(function(y) {
    var arr = yearMap[y];
    return Math.round(arr.reduce(function(a,b){return a+b;},0) / arr.length * 10) / 10;
  });

  // 大会別成績テーブル
  var rows = records.map(function(r) {
    return '<tr>'
      + '<td>' + r.year + '年</td>'
      + '<td style="font-size:12px">' + r.event + '</td>'
      + '<td class="record-rank">#' + r.rank + '</td>'
      + '<td class="text-right" style="color:#6366f1;font-weight:700">' + r.pt + '</td>'
      + '</tr>';
  }).join('');

  document.getElementById('modalContent').innerHTML =
    '<div class="modal-name">' + p.name + '</div>'
    + '<div class="modal-univ">' + p.univ + ' / ' + clsLabel + ' / ' + p.role + '</div>'
    + '<div class="modal-stats">'
    +   '<div class="stat-card"><div class="stat-val">' + totalPt + '</div><div class="stat-label">累計Pt</div></div>'
    +   '<div class="stat-card"><div class="stat-val">' + records.length + '</div><div class="stat-label">出場大会</div></div>'
    +   '<div class="stat-card"><div class="stat-val">' + bestRank + '</div><div class="stat-label">最高順位</div></div>'
    + '</div>'
    + '<div class="chart-wrap">'
    +   '<div class="chart-title">年度別 平均順位</div>'
    +   '<canvas id="rankChart" height="200"></canvas>'
    + '</div>'
    + '<div class="chart-title">大会別成績</div>'
    + '<table class="record-table">'
    +   '<thead><tr><th>年度</th><th>大会名</th><th>着順</th><th class="text-right">獲得Pt</th></tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>';

  document.getElementById('modalOverlay').classList.add('open');

  if (chartInstance) chartInstance.destroy();
  var ctx = document.getElementById('rankChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: years.map(function(y){ return y + '年'; }),
      datasets: [{
        label: '平均順位',
        data: avgRanks,
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,.1)',
        pointBackgroundColor: '#00d4ff',
        pointRadius: 6,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          reverse: true,
          min: 1,
          ticks: { color: '#6b7a8d', stepSize: 1, callback: function(v){ return '#'+v; } },
          grid: { color: 'rgba(255,255,255,.06)' },
          title: { display: true, text: '平均順位（上位ほど上）', color: '#6b7a8d' }
        },
        x: { ticks: { color: '#6b7a8d' }, grid: { color: 'rgba(255,255,255,.04)' } }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var y = years[ctx.dataIndex];
              var cnt = yearMap[y].length;
              return '平均順位: #' + ctx.parsed.y + '（' + cnt + '大会）';
            }
          }
        }
      }
    }
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// 検索（デバウンス付き）
var searchTimer = null;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var q = this.value.trim();
  var self = this;
  searchTimer = setTimeout(function() {
    if (!q) { renderGrid([], ''); return; }
    var filtered = allPlayers.filter(function(p) {
      return p.name.includes(q) || p.univ.includes(q);
    });
    renderGrid(filtered.slice(0, 100), q);
  }, 200);
});

// 初期化
document.addEventListener('DOMContentLoaded', function() {
  allPlayers = getAllPlayers();
  var totalEl = document.getElementById('totalPlayers');
  if (totalEl) totalEl.textContent = allPlayers.length;
  renderGrid([], '');

  // URLパラメータで選手を直接開く（ranking.htmlからの遷移）
  var params = new URLSearchParams(location.search);
  var nameParam = params.get('name');
  if (nameParam) {
    document.getElementById('searchInput').value = nameParam;
    var filtered = allPlayers.filter(function(p){ return p.name.includes(nameParam); });
    renderGrid(filtered.slice(0, 100), nameParam);
    if (filtered.length > 0) {
      var found = filtered[0];
      openModal(found.name, found.univ, found.cls, found.role);
    }
  }
});
</script>
