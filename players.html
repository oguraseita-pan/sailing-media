<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
// 全選手データを結合・重複排除
function getAllPlayers() {
  const map = {};
  const sources = [
    SITE_DATA.individualRanking,
    SITE_DATA.rankingSkipper,
    SITE_DATA.rankingCrew,
    SITE_DATA.ranking470Skipper,
    SITE_DATA.ranking470Crew,
    SITE_DATA.rankingSnipeSkipper,
    SITE_DATA.rankingSnipeCrew,
  ];
  // 年度別も含める
  Object.keys(SITE_DATA).forEach(k => {
    if (/^y\d{4}_/.test(k) && Array.isArray(SITE_DATA[k])) {
      sources.push(SITE_DATA[k]);
    }
  });
  sources.forEach(arr => {
    if (!Array.isArray(arr)) return;
    arr.forEach(p => {
      const key = p.name + '|' + p.univ + '|' + p.cls + '|' + p.role;
      if (!map[key] || map[key].pt < p.allPt) {
        map[key] = {...p, pt: p.allPt};
      }
    });
  });
  return Object.values(map).sort((a,b) => b.pt - a.pt);
}

let allPlayers = [];
let chartInstance = null;

function renderGrid(players, query) {
  const grid = document.getElementById('playerGrid');
  const info = document.getElementById('searchInfo');

  if (!query) {
    grid.innerHTML = '';
    info.textContent = '選手名または大学名を入力して検索してください';
    return;
  }

  if (players.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px">該当する選手が見つかりませんでした</p>';
    info.textContent = `「${query}」の検索結果: 0件`;
    return;
  }

  info.textContent = `「${query}」の検索結果: ${players.length}名`;

  grid.innerHTML = players.map(p => {
    const clsLabel = p.cls === '470' ? '470級' : 'スナイプ級';
    const roleTag = p.role === 'Skipper'
      ? '<span class="pc-tag tag-sk">Skipper</span>'
      : '<span class="pc-tag tag-cr">Crew</span>';
    const clsTag = p.cls === '470'
      ? '<span class="pc-tag tag-470">470級</span>'
      : '<span class="pc-tag tag-snipe">Snipe</span>';
    return `<div class="player-card" onclick="openModal('${p.name.replace(/'/g,"\'")}','${p.univ.replace(/'/g,"\'")}','${p.cls}','${p.role}')">
      <div class="pc-name">${p.name}</div>
      <div class="pc-univ">${p.univ}</div>
      <div class="pc-meta">${roleTag}${clsTag}</div>
      <div class="pc-pt">${p.pt} pt</div>
    </div>`;
  }).join('');
}

function openModal(name, univ, cls, role) {
  const key = name + '|' + univ + '|' + cls + '|' + role;
  const p = allPlayers.find(x => (x.name+'|'+x.univ+'|'+x.cls+'|'+x.role) === key)
         || allPlayers.find(x => x.name === name && x.univ === univ);
  if (!p) return;

  const records = p.records || [];
  const sorted = [...records].sort((a,b) => a.year - b.year || a.event.localeCompare(b.event));
  const labels = sorted.map(r => r.event.replace(/\d{4}年[度]?/,'').replace('関東学生ヨット','').replace('選手権大会','').replace('決勝','決勝').replace(' スナイプ級','Sn').replace(' 470級','470'));
  const ranks = sorted.map(r => r.rank);
  const pts = sorted.map(r => r.pt);
  const clsLabel = p.cls === '470' ? '470級' : 'スナイプ級';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-name">${p.name}</div>
    <div class="modal-univ">${p.univ} / ${clsLabel} / ${p.role}</div>
    <div class="modal-stats">
      <div class="stat-card"><div class="stat-val">${p.pt}</div><div class="stat-label">累計Pt</div></div>
      <div class="stat-card"><div class="stat-val">${sorted.length}</div><div class="stat-label">出場大会</div></div>
      <div class="stat-card"><div class="stat-val">${ranks.length ? Math.min(...ranks) : '-'}</div><div class="stat-label">最高順位</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">大会別 着順推移</div>
      <canvas id="rankChart" height="200"></canvas>
    </div>
    <div class="chart-title" style="margin-top:16px">大会別成績</div>
    <table class="record-table">
      <thead><tr><th>年度</th><th>大会</th><th>着順</th><th class="text-right">獲得Pt</th></tr></thead>
      <tbody>
        ${sorted.map(r=>`<tr>
          <td>${r.year}</td>
          <td style="font-size:12px">${r.event}</td>
          <td class="record-rank">#${r.rank}</td>
          <td class="text-right" style="color:#6366f1;font-weight:700">${r.pt}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;

  document.getElementById('modalOverlay').classList.add('open');

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('rankChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '着順',
        data: ranks,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,.1)',
        pointBackgroundColor: '#6366f1',
        pointRadius: 5,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          reverse: true, min: 1,
          ticks: { color: '#64748b', stepSize: 1 },
          grid: { color: 'rgba(0,0,0,.06)' },
          title: { display: true, text: '着順（上位ほど上）', color: '#64748b' }
        },
        x: { ticks: { color: '#64748b', maxRotation: 45 }, grid: { color: 'rgba(0,0,0,.04)' } }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.y}位 (${pts[ctx.dataIndex]}pt)` } }
      }
    }
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

// 検索
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  searchTimer = setTimeout(() => {
    if (!q) { renderGrid([], ''); return; }
    const filtered = allPlayers.filter(p =>
      p.name.includes(q) || p.univ.includes(q)
    );
    renderGrid(filtered.slice(0, 100), q);
  }, 200);
});

document.addEventListener('DOMContentLoaded', () => {
  allPlayers = getAllPlayers();
  // 統計表示
  const totalEl = document.getElementById('totalPlayers');
  if (totalEl) totalEl.textContent = allPlayers.length;
  renderGrid([], '');

  const params = new URLSearchParams(location.search);
  const nameParam = params.get('name');
  if (nameParam) {
    document.getElementById('searchInput').value = nameParam;
    const filtered = allPlayers.filter(p => p.name.includes(nameParam));
    renderGrid(filtered.slice(0,100), nameParam);
    if (filtered.length > 0) {
      const p = filtered[0];
      openModal(p.name, p.univ, p.cls, p.role);
    }
  }
});
</script>
