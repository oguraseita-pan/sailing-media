<head>

</head>
<body>

        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        TACK
      </a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="ranking.html">ランキング</a>
    <a href="forecast.html">AI予測</a>
    <a href="players.html">選手DB</a>
    <a href="results.html">大会結果</a>
    <a href="index.html">← TACKトップへ</a>
  </div>
</nav>
<div class="page-hero">
  <div class="page-hero-inner">
    <div class="section-label">PLAYERS</div>
    <h1 class="page-title">選手データベース</h1>
    <p class="page-desc">2016〜2019年度の出場選手968名。クリックで成績グラフを表示。</p>
  </div>
</div>
<div class="search-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="選手名・大学名で検索...">
</div>
<div class="player-grid" id="playerGrid"></div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand"><div class="logo">SAIL<span>RANK</span></div><p>学生セーリングの熱量を、数字で伝える。</p></div>
      <div class="footer-links"><a href="ranking.html">ランキング</a><a href="forecast.html">AI予測</a><a href="players.html">選手DB</a><a href="results.html">大会結果</a></div>
    </div>
    <div class="footer-bottom"><small>© 2024 SAIL RANK.</small></div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
// 全選手データを結合
function getAllPlayers() {
  const map = {};
  const sources = [
    SITE_DATA.individualRanking,
    SITE_DATA.rankingSkipper,
    SITE_DATA.rankingCrew,
    SITE_DATA.ranking470Skipper,
    SITE_DATA.ranking470Crew,
    SITE_DATA.rankingSnipeSkipper,
    SITE_DATA.rankingSnipeCrew,
  ];
  sources.forEach(arr => arr.forEach(p => {
    if (!map[p.name]) map[p.name] = p;
  }));
  return Object.values(map).sort((a,b) => b.pt - a.pt);
}

let allPlayers = [];
let chartInstance = null;

function renderGrid(players) {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = players.map(p => {
    const cls = p.cls === '470' ? '470級' : 'スナイプ級';
    const roleTag = p.role === 'Skipper'
      ? `<span class="pc-tag tag-sk">Skipper</span>`
      : `<span class="pc-tag tag-cr">Crew</span>`;
    const clsTag = p.cls === '470'
      ? `<span class="pc-tag tag-470">470級</span>`
      : `<span class="pc-tag tag-snipe">Snipe</span>`;
    return `<div class="player-card" onclick="openModal('${p.name.replace(/'/g,"\\'")}')">
      <div class="pc-name">${p.name}</div>
      <div class="pc-univ">${p.univ}</div>
      <div class="pc-meta">${roleTag}${clsTag}</div>
      <div class="pc-pt">${p.pt} pt</div>
    </div>`;
  }).join('');
}

function openModal(name) {
  const p = allPlayers.find(x => x.name === name);
  if (!p) return;

  const cls = p.cls === '470' ? '470級' : 'スナイプ級';
  const records = p.records || [];
  const sorted = [...records].sort((a,b) => a.year - b.year || a.event.localeCompare(b.event));

  // グラフデータ（大会ごとの順位）
  const labels = sorted.map(r => r.event.replace(/\d{4}/,'').replace('関東個人','個人').replace('春季決勝','春決').replace('秋季決勝','秋決'));
  const ranks  = sorted.map(r => r.rank);
  const pts    = sorted.map(r => r.pt);

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-name">${p.name}</div>
    <div class="modal-univ">${p.univ} / ${cls} / ${p.role}</div>
    <div class="modal-stats">
      <div class="stat-card"><div class="stat-val">${p.pt}</div><div class="stat-label">累計Pt</div></div>
      <div class="stat-card"><div class="stat-val">${p.events}</div><div class="stat-label">出場大会</div></div>
      <div class="stat-card"><div class="stat-val">${ranks.length ? Math.min(...ranks) : '-'}</div><div class="stat-label">最高順位</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">大会別 着順推移</div>
      <canvas id="rankChart" height="200"></canvas>
    </div>
    <div class="chart-title">大会別 獲得ポイント</div>
    <table class="record-table">
      <thead><tr><th>年度</th><th>大会</th><th>着順</th><th class="text-right">獲得Pt</th></tr></thead>
      <tbody>
        ${sorted.map(r=>`<tr>
          <td>${r.year}</td>
          <td>${r.event}</td>
          <td class="record-rank">#${r.rank}</td>
          <td class="text-right" style="color:#6366f1;font-weight:700">${r.pt}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;

  document.getElementById('modalOverlay').classList.add('open');

  // グラフ描画
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('rankChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '着順',
        data: ranks,
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,.1)',
        pointBackgroundColor: '#00d4ff',
        pointRadius: 5,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          reverse: true,
          min: 1,
          ticks: { color: '#6b7a8d', stepSize: 1 },
          grid: { color: 'rgba(255,255,255,.06)' },
          title: { display: true, text: '着順（上位ほど上）', color: '#6b7a8d' }
        },
        x: { ticks: { color: '#6b7a8d', maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.04)' } }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y}位 (${pts[ctx.dataIndex]}pt)`
          }
        }
      }
    }
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// 検索
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allPlayers.filter(p => p.name.includes(q) || p.univ.toLowerCase().includes(q))
    : allPlayers;
  renderGrid(filtered.slice(0, 60));
});

// URLパラメータで選手を直接開く
document.addEventListener('DOMContentLoaded', () => {
  allPlayers = getAllPlayers();
  renderGrid(allPlayers.slice(0, 60));

  const params = new URLSearchParams(location.search);
  const nameParam = params.get('name');
  if (nameParam) openModal(nameParam);
});
</script>

<script>
const hb=document.getElementById('hamburger'),mm=document.getElementById('mobileMenu');
if(hb&&mm)hb.addEventListener('click',()=>{hb.classList.toggle('active');mm.classList.toggle('open');});
window.addEventListener('scroll',()=>{
  document.getElementById('nav').style.boxShadow=window.scrollY>10?'0 2px 12px rgba(0,0,0,.06)':'';
});
</script>
</body>
