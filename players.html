<style>
.page-hero{padding:120px 24px 60px;background:linear-gradient(180deg,rgba(0,100,200,.12) 0%,transparent 100%);border-bottom:1px solid var(--border)}
.page-hero-inner{max-width:1200px;margin:auto}
.page-title{font-family:var(--font-display);font-size:clamp(44px,6vw,72px);letter-spacing:.04em;color:#fff;margin-bottom:8px}
.page-desc{font-size:15px;color:var(--muted2)}

/* 検索 */
.search-bar{max-width:1200px;margin:32px auto 0;padding:0 24px}
.search-input{width:100%;padding:14px 20px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:var(--radius-sm);color:#fff;font-size:15px;font-family:var(--font-body);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent)}

/* 選手一覧 */
.player-grid{max-width:1200px;margin:24px auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.player-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .2s}
.player-card:hover{border-color:rgba(0,212,255,.3);transform:translateY(-2px)}
.pc-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.pc-univ{font-size:13px;color:var(--muted2)}
.pc-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.pc-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.tag-sk{background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.25);color:var(--accent)}
.tag-cr{background:rgba(245,183,49,.12);border:1px solid rgba(245,183,49,.25);color:var(--gold)}
.tag-470{background:rgba(255,255,255,.08);color:var(--muted2);border:1px solid var(--border)}
.tag-snipe{background:rgba(255,255,255,.08);color:var(--muted2);border:1px solid var(--border)}
.pc-pt{font-family:var(--font-display);font-size:22px;color:var(--accent);letter-spacing:.04em;margin-top:6px}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:32px}
.modal-close{float:right;background:none;border:none;color:var(--muted2);font-size:24px;cursor:pointer;line-height:1}
.modal-name{font-family:var(--font-display);font-size:48px;color:#fff;letter-spacing:.04em;margin-bottom:4px}
.modal-univ{font-size:15px;color:var(--muted2);margin-bottom:16px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-family:var(--font-display);font-size:28px;color:var(--accent);letter-spacing:.04em}
.stat-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-top:2px}

/* グラフ */
.chart-title{font-size:13px;font-weight:700;color:var(--muted2);margin-bottom:12px;letter-spacing:.06em;text-transform:uppercase}
.chart-wrap{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px}
canvas{width:100%!important}

/* レース記録テーブル */
.record-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.record-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
.record-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--muted2)}
.record-table tr:last-child td{border-bottom:none}
.record-rank{font-family:var(--font-display);font-size:18px;color:var(--accent)}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
// 全選手データを結合
function getAllPlayers() {
  const map = {};
  const sources = [
    SITE_DATA.individualRanking,
    SITE_DATA.rankingSkipper,
    SITE_DATA.rankingCrew,
    SITE_DATA.ranking470Skipper,
    SITE_DATA.ranking470Crew,
    SITE_DATA.rankingSnipeSkipper,
    SITE_DATA.rankingSnipeCrew,
  ];
  sources.forEach(arr => arr.forEach(p => {
    if (!map[p.name]) map[p.name] = p;
  }));
  return Object.values(map).sort((a,b) => b.pt - a.pt);
}

let allPlayers = [];
let chartInstance = null;

function renderGrid(players) {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = players.map(p => {
    const cls = p.cls === '470' ? '470級' : 'スナイプ級';
    const roleTag = p.role === 'Skipper'
      ? `<span class="pc-tag tag-sk">Skipper</span>`
      : `<span class="pc-tag tag-cr">Crew</span>`;
    const clsTag = p.cls === '470'
      ? `<span class="pc-tag tag-470">470級</span>`
      : `<span class="pc-tag tag-snipe">Snipe</span>`;
    return `<div class="player-card" onclick="openModal('${p.name.replace(/'/g,"\\'")}')">
      <div class="pc-name">${p.name}</div>
      <div class="pc-univ">${p.univ}</div>
      <div class="pc-meta">${roleTag}${clsTag}</div>
      <div class="pc-pt">${p.pt} pt</div>
    </div>`;
  }).join('');
}

function openModal(name) {
  const p = allPlayers.find(x => x.name === name);
  if (!p) return;

  const cls = p.cls === '470' ? '470級' : 'スナイプ級';
  const records = p.records || [];
  const sorted = [...records].sort((a,b) => a.year - b.year || a.event.localeCompare(b.event));

  // グラフデータ（大会ごとの順位）
  const labels = sorted.map(r => r.event.replace(/\d{4}/,'').replace('関東個人','個人').replace('春季決勝','春決').replace('秋季決勝','秋決'));
  const ranks  = sorted.map(r => r.rank);
  const pts    = sorted.map(r => r.pt);

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-name">${p.name}</div>
    <div class="modal-univ">${p.univ} / ${cls} / ${p.role}</div>
    <div class="modal-stats">
      <div class="stat-card"><div class="stat-val">${p.pt}</div><div class="stat-label">累計Pt</div></div>
      <div class="stat-card"><div class="stat-val">${p.events}</div><div class="stat-label">出場大会</div></div>
      <div class="stat-card"><div class="stat-val">${ranks.length ? Math.min(...ranks) : '-'}</div><div class="stat-label">最高順位</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">大会別 着順推移</div>
      <canvas id="rankChart" height="200"></canvas>
    </div>
    <div class="chart-title">大会別 獲得ポイント</div>
    <table class="record-table">
      <thead><tr><th>年度</th><th>大会</th><th>着順</th><th class="text-right">獲得Pt</th></tr></thead>
      <tbody>
        ${sorted.map(r=>`<tr>
          <td>${r.year}</td>
          <td>${r.event}</td>
          <td class="record-rank">#${r.rank}</td>
          <td class="text-right" style="color:var(--accent);font-weight:700">${r.pt}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;

  document.getElementById('modalOverlay').classList.add('open');

  // グラフ描画
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('rankChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '着順',
        data: ranks,
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,.1)',
        pointBackgroundColor: '#00d4ff',
        pointRadius: 5,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          reverse: true,
          min: 1,
          ticks: { color: '#6b7a8d', stepSize: 1 },
          grid: { color: 'rgba(255,255,255,.06)' },
          title: { display: true, text: '着順（上位ほど上）', color: '#6b7a8d' }
        },
        x: { ticks: { color: '#6b7a8d', maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.04)' } }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y}位 (${pts[ctx.dataIndex]}pt)`
          }
        }
      }
    }
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// 検索
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allPlayers.filter(p => p.name.includes(q) || p.univ.toLowerCase().includes(q))
    : allPlayers;
  renderGrid(filtered.slice(0, 60));
});

// URLパラメータで選手を直接開く
document.addEventListener('DOMContentLoaded', () => {
  allPlayers = getAllPlayers();
  renderGrid(allPlayers.slice(0, 60));

  const params = new URLSearchParams(location.search);
  const nameParam = params.get('name');
  if (nameParam) openModal(nameParam);
});
</script>
